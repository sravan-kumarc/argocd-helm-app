apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-uat
  namespace: argocd
spec:
  project: uat-project

  source:
    repoURL: https://github.com/sravan-kumarc/argocd-helm-app
    targetRevision: main
    path: nginx-chart
    helm:
      valueFiles:
        - values/values-uat.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: uat

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
