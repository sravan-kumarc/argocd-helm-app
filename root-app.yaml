apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sravan-kumarc/argocd-helm-app
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
